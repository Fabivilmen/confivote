<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Votação</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #e0f2fe, #dbeafe, #bfdbfe);
}
.card {
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}
h2 {
  font-weight: 800;
  color: #1e3a8a;
}
.btn {
  border-radius: 10px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container py-5">

<div class="card p-4 text-center">

<h2>ConfiVote</h2>

<div id="status">Carregando...</div>

<div id="areaVoto" style="display:none; margin-top:20px;">
  <button class="btn btn-success w-100 mb-2" onclick="votar('SIM')">SIM</button>
  <button class="btn btn-danger w-100 mb-2" onclick="votar('NAO')">NÃO</button>
  <button class="btn btn-warning w-100" onclick="votar('ABSTENCAO')">ABSTENÇÃO</button>
</div>

<div id="mensagem" style="margin-top:15px;"></div>

</div>

</div>

<script>
window.onload = function(){

  const params = new URLSearchParams(window.location.search);

  const token = params.get("token");
  const assembleiaId = params.get("assembleiaId");

  window.tokenGlobal = token;
  window.assembleiaIdGlobal = assembleiaId;

  const statusEl = document.getElementById("status");

  if (!token) {
    statusEl.innerText = "Token não informado";
    return;
  }

  validarToken(token);
};

async function validarToken(token){
  try{

    const resp = await fetch("/api/votar/validar?token=" + encodeURIComponent(token));
    const data = await resp.json();

    if(!data.ok){
      document.getElementById("status").innerText = "Token inválido";
      return;
    }

    document.getElementById("status").innerText =
      "Unidade: " + data.unidade + " | Peso: " + data.peso;

    verificarPauta();

  }catch(e){
    document.getElementById("status").innerText = "Erro ao validar token";
  }
}

async function verificarPauta(){
  try{

    const resp = await fetch("/api/pautas/ativa?assembleiaId=" + assembleiaIdGlobal);
    const pauta = await resp.json();

    if(!pauta.ativa){
      document.getElementById("mensagem").innerText = "Aguardando abertura da pauta...";
      setTimeout(verificarPauta, 3000);
      return;
    }

    document.getElementById("mensagem").innerText =
      "Pauta " + pauta.numero + " aberta: " + pauta.titulo;

    document.getElementById("areaVoto").style.display = "block";

  }catch(e){
    document.getElementById("mensagem").innerText = "Erro ao verificar pauta";
  }
}

async function votar(voto){
  try{

    await fetch("/api/votos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token: tokenGlobal,
        assembleiaId: assembleiaIdGlobal,
        voto: voto
      })
    });

    document.getElementById("mensagem").innerText = "Voto registrado com sucesso";
    document.getElementById("areaVoto").style.display = "none";

  }catch(e){
    document.getElementById("mensagem").innerText = "Erro ao votar";
  }
}
</script>

</body>
</html>
