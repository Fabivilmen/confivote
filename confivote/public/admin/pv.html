<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PV / ATA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4" style="max-width:900px">

<h4>PV / ATA</h4>

<div id="pv"></div>

<button class="btn btn-primary mt-3" onclick="window.print()">Imprimir</button>

</div>

<script>
const params = new URLSearchParams(location.search);
const assembleiaId = params.get("assembleiaId");

const pv = document.getElementById("pv");

async function carregar(){

try{

const assembleiaRes = await fetch(`/api/assembleias/${assembleiaId}`);
const pautasRes = await fetch(`/api/pautas/${assembleiaId}`);
const presRes = await fetch(`/api/presencas/${assembleiaId}`);

const assembleiaJson = await assembleiaRes.json();
const pautasJson = await pautasRes.json();
const presJson = await presRes.json();

const assembleia = assembleiaJson.assembleia || assembleiaJson.dados || {};
const pautas = pautasJson.dados || [];
const pres = presJson.dados || [];

let html = `<h5>${assembleia.condominio || assembleia.nomeCondominio || ""}</h5>`;
html += `<p>Data: ${assembleia.data || ""}</p><hr>`;

for (const p of pautas){

  const votosRes = await fetch(`/api/votos/pauta/${p.id}`);
  const votosJson = await votosRes.json();
  const votos = votosJson.dados || [];

  let sim=0,nao=0,abs=0;

  votos.forEach(v=>{
    const vv = String(v.voto || v.escolha).toUpperCase();
    const peso = Number(v.peso || v.quotite || 0);

    if(vv==="SIM") sim+=peso;
    else if(vv==="NAO" || vv==="NÃO") nao+=peso;
    else abs+=peso;
  });

  html+=`
  <h6>${p.titulo}</h6>
  SIM ${sim} | NAO ${nao} | ABS ${abs}
  <hr>
  `;
}

pv.innerHTML = html;

}catch{
pv.innerHTML="Erro gerar ata";
}
}

carregar();
</script>

</body>
</html>
