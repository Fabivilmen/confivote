<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sessão da Assembleia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #e0f2fe, #dbeafe, #bfdbfe);
}
.card {
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}
h3, h4 {
  font-weight: 800;
  color: #1e3a8a;
}
.btn {
  border-radius: 10px;
  font-weight: 600;
}
.btn-success {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
}
.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none;
}
.btn-dark {
  background: #1e293b;
  border: none;
}
.form-control, textarea {
  border-radius: 10px;
}
.badge-status {
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}
.aberta { background:#d1fae5; color:#065f46; }
.fechada { background:#fee2e2; color:#7f1d1d; }
</style>
</head>

<body>

<div class="container py-4">

<div class="text-center mb-3">
  <img src="/img/logo-confivote.png" style="width:90px;">
</div>

<div class="card p-4 mb-4">
  <h3>Sessão da Assembleia</h3>

  <div class="row mb-3">
    <div class="col">
      <label>Presidente</label>
      <input id="presidente" class="form-control">
    </div>
    <div class="col">
      <label>Secretário</label>
      <input id="secretario" class="form-control">
    </div>
    <div class="col">
      <label>Síndico</label>
      <input id="sindico" class="form-control">
    </div>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-success w-100" onclick="abrirSessao()">Abrir Sessão</button>
    <button class="btn btn-secondary w-100" onclick="limparSessao()">Nova Sessão</button>
  </div>

  <div id="horaInicio" class="mt-2"></div>

  <button class="btn btn-danger w-100 mt-2" onclick="encerrarSessao()">Encerrar Sessão</button>
  <div id="horaEncerramento"></div>
</div>

<div class="alert alert-info text-center mb-3" id="statusVotacao">
  Nenhuma pauta aberta
</div>

<div class="d-flex justify-content-between align-items-center mb-2">
  <h4>Pautas</h4>
  <button class="btn btn-dark" onclick="gerarAta()">Gerar ATA (PDF)</button>
</div>

<div id="listaPautas"></div>

<div class="card p-4 mt-4">
  <div class="mb-3">
    <label><b>Observações</b></label>
    <textarea id="observacoes" class="form-control" rows="3"></textarea>
  </div>

  <div class="mb-3">
    <label><b>Pontos para próxima AG</b></label>
    <textarea id="proximaAG" class="form-control" rows="3"></textarea>
  </div>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const assembleiaId = params.get("assembleiaId") || 1;

/* LIMPA AUTOMATICAMENTE AO ATUALIZAR */
window.onload = () => {
  limparSessao();
};

function limparSessao(){
  localStorage.removeItem("presidente_" + assembleiaId);
  localStorage.removeItem("secretario_" + assembleiaId);
  localStorage.removeItem("sindico_" + assembleiaId);
  localStorage.removeItem("observacoes_" + assembleiaId);
  localStorage.removeItem("proximaAG_" + assembleiaId);
  localStorage.removeItem("horaInicio_" + assembleiaId);
  localStorage.removeItem("horaEncerramento_" + assembleiaId);

  document.getElementById("presidente").value = "";
  document.getElementById("secretario").value = "";
  document.getElementById("sindico").value = "";
  document.getElementById("observacoes").value = "";
  document.getElementById("proximaAG").value = "";
  document.getElementById("horaInicio").innerText = "";
  document.getElementById("horaEncerramento").innerText = "";
}

function abrirSessao(){
  const presidente = document.getElementById("presidente").value.trim();
  const secretario = document.getElementById("secretario").value.trim();

  if(!presidente || !secretario){
    alert("Preencha Presidente e Secretário");
    return;
  }

  const hora = new Date().toLocaleTimeString();

  document.getElementById("horaInicio").innerText =
    "Início da sessão: " + hora;

  localStorage.setItem("horaInicio_" + assembleiaId, hora);

  salvarCampos();
}

function encerrarSessao(){
  const hora = new Date().toLocaleTimeString();
  document.getElementById("horaEncerramento").innerText =
    "Encerramento da sessão: " + hora;

  localStorage.setItem("horaEncerramento_" + assembleiaId, hora);
}

function salvarCampos(){
  localStorage.setItem("presidente_" + assembleiaId, document.getElementById("presidente").value);
  localStorage.setItem("secretario_" + assembleiaId, document.getElementById("secretario").value);
  localStorage.setItem("sindico_" + assembleiaId, document.getElementById("sindico").value);
  localStorage.setItem("observacoes_" + assembleiaId, document.getElementById("observacoes").value);
  localStorage.setItem("proximaAG_" + assembleiaId, document.getElementById("proximaAG").value);
}

async function carregarPautas(){
  const resp = await fetch("/api/pautas/" + assembleiaId);
  const pautas = await resp.json();

  const div = document.getElementById("listaPautas");
  div.innerHTML = "";

  pautas.forEach(p => {
    const el = document.createElement("div");

    el.innerHTML = `
      <div class="card p-3 mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <b>${p.numero}. ${p.titulo}</b>
            <div class="text-muted small">${p.descricao || ""}</div>
            <span class="badge-status ${p.status === 'aberta' ? 'aberta' : 'fechada'}">
              ${p.status}
            </span>
          </div>
          <div>
            <button class="btn btn-success btn-sm" onclick="abrirPauta(${p.numero})">Abrir</button>
            <button class="btn btn-danger btn-sm" onclick="encerrarPauta(${p.numero})">Encerrar</button>
          </div>
        </div>
      </div>
    `;

    div.appendChild(el);
  });
}

async function abrirPauta(numero){
  await fetch("/api/pautas/abrir/" + numero + "?assembleiaId=" + assembleiaId, { method: "POST" });
  carregarPautas();
}

async function encerrarPauta(numero){
  await fetch("/api/pautas/encerrar/" + numero + "?assembleiaId=" + assembleiaId, { method: "POST" });
  carregarPautas();
}

function gerarAta(){
  salvarCampos();

  const inicio = localStorage.getItem("horaInicio_" + assembleiaId);
  const fim = localStorage.getItem("horaEncerramento_" + assembleiaId);

  const url =
    "/api/ata/pdf?assembleiaId=" + assembleiaId +
    "&inicio=" + encodeURIComponent(inicio || "") +
    "&fim=" + encodeURIComponent(fim || "") +
    "&presidente=" + encodeURIComponent(localStorage.getItem("presidente_" + assembleiaId) || "") +
    "&secretario=" + encodeURIComponent(localStorage.getItem("secretario_" + assembleiaId) || "") +
    "&sindico=" + encodeURIComponent(localStorage.getItem("sindico_" + assembleiaId) || "") +
    "&observacoes=" + encodeURIComponent(localStorage.getItem("observacoes_" + assembleiaId) || "") +
    "&proximaAG=" + encodeURIComponent(localStorage.getItem("proximaAG_" + assembleiaId) || "");

  window.open(url, "_blank");
}

document.querySelectorAll("#presidente,#secretario,#sindico,#observacoes,#proximaAG")
  .forEach(el => el.addEventListener("input", salvarCampos));

carregarPautas();
</script>

</body>
</html>
