<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sessão da Assembleia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* FUNDO PADRÃO */
body {
  background: linear-gradient(135deg, #e0f2fe, #dbeafe, #bfdbfe);
}

/* CARD */
.card {
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* TÍTULOS */
h3, h4 {
  font-weight: 800;
  color: #1e3a8a;
}

/* BOTÕES */
.btn {
  border-radius: 10px;
  font-weight: 600;
}

.btn-success {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
}

.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none;
}

.btn-dark {
  background: #1e293b;
  border: none;
}

/* STATUS BADGE */
.badge-status {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
}

.aberta {
  background: #d1fae5;
  color: #065f46;
}

.fechada {
  background: #fee2e2;
  color: #7f1d1d;
}

/* STATUS VOTAÇÃO */
#statusVotacao {
  font-weight: 600;
  border-radius: 12px;
}

/* INPUTS */
.form-control {
  border-radius: 10px;
}

/* TEXTAREA */
textarea {
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="container py-4">

<!-- LOGO -->
<div class="text-center mb-3">
  <img src="/img/logo-confivote.png" style="width:90px;">
</div>

<div class="card p-4 mb-4">
  <h3>Sessão da Assembleia</h3>

  <div class="row mb-3">
    <div class="col">
      <label>Presidente</label>
      <input id="presidente" class="form-control">
    </div>
    <div class="col">
      <label>Secretário</label>
      <input id="secretario" class="form-control">
    </div>
    <div class="col">
      <label>Síndic</label>
      <input id="sindico" class="form-control">
    </div>
  </div>

  <button class="btn btn-success w-100 mb-2" onclick="abrirSessao()">Abrir Sessão</button>
  <div id="horaInicio"></div>

  <button class="btn btn-danger w-100 mt-2" onclick="encerrarSessao()">Encerrar Sessão</button>
  <div id="horaEncerramento"></div>
</div>

<div class="alert alert-info text-center mb-3" id="statusVotacao">
  Nenhuma pauta aberta
</div>

<div class="d-flex justify-content-between align-items-center mb-2">
  <h4>Pautas</h4>

  <button class="btn btn-dark" onclick="gerarAta()">
    Gerar ATA (PDF)
  </button>
</div>

<div id="listaPautas"></div>

<div class="card p-4 mt-4">

  <div class="mb-3">
    <label><b>Observações</b></label>
    <textarea id="observacoes" class="form-control" rows="3"></textarea>
  </div>

  <div class="mb-3">
    <label><b>Pontos para próxima AG</b></label>
    <textarea id="proximaAG" class="form-control" rows="3"></textarea>
  </div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const assembleiaId = params.get("assembleiaId") || 1;

function abrirSessao(){
  const hora = new Date().toLocaleTimeString();
  document.getElementById("horaInicio").innerText = "Início da sessão: " + hora;
  localStorage.setItem("horaInicio_" + assembleiaId, hora);
}

function encerrarSessao(){
  const hora = new Date().toLocaleTimeString();
  document.getElementById("horaEncerramento").innerText = "Encerramento da sessão: " + hora;
  localStorage.setItem("horaEncerramento_" + assembleiaId, hora);
}

function salvarCamposSessao(){
  localStorage.setItem("observacoes_" + assembleiaId, document.getElementById("observacoes").value);
  localStorage.setItem("proximaAG_" + assembleiaId, document.getElementById("proximaAG").value);
  localStorage.setItem("presidente_" + assembleiaId, document.getElementById("presidente").value);
  localStorage.setItem("secretario_" + assembleiaId, document.getElementById("secretario").value);
  localStorage.setItem("sindico_" + assembleiaId, document.getElementById("sindico").value);
}

function carregarCamposSessao(){
  document.getElementById("observacoes").value = localStorage.getItem("observacoes_" + assembleiaId) || "";
  document.getElementById("proximaAG").value = localStorage.getItem("proximaAG_" + assembleiaId) || "";
  document.getElementById("presidente").value = localStorage.getItem("presidente_" + assembleiaId) || "";
  document.getElementById("secretario").value = localStorage.getItem("secretario_" + assembleiaId) || "";
  document.getElementById("sindico").value = localStorage.getItem("sindico_" + assembleiaId) || "";

  const inicio = localStorage.getItem("horaInicio_" + assembleiaId);
  const fim = localStorage.getItem("horaEncerramento_" + assembleiaId);

  if (inicio) document.getElementById("horaInicio").innerText = "Início da sessão: " + inicio;
  if (fim) document.getElementById("horaEncerramento").innerText = "Encerramento da sessão: " + fim;
}

function gerarAta(){
  salvarCamposSessao();

  const inicio = localStorage.getItem("horaInicio_" + assembleiaId);
  const fim = localStorage.getItem("horaEncerramento_" + assembleiaId);

  if(!inicio){ alert("Abra a sessão"); return; }
  if(!fim){ alert("Encerrar a sessão"); return; }

  const url =
    window.location.origin +
    "/api/ata/pdf?assembleiaId=" + assembleiaId +
    "&inicio=" + encodeURIComponent(inicio) +
    "&fim=" + encodeURIComponent(fim) +
    "&observacoes=" + encodeURIComponent(localStorage.getItem("observacoes_" + assembleiaId) || "") +
    "&proximaAG=" + encodeURIComponent(localStorage.getItem("proximaAG_" + assembleiaId) || "") +
    "&presidente=" + encodeURIComponent(localStorage.getItem("presidente_" + assembleiaId) || "") +
    "&secretario=" + encodeURIComponent(localStorage.getItem("secretario_" + assembleiaId) || "") +
    "&sindico=" + encodeURIComponent(localStorage.getItem("sindico_" + assembleiaId) || "");

  window.open(url, "_blank");
}

async function atualizarStatusVotacao(){
  try{
    const pauta = await (await fetch("/api/pautas/ativa?assembleiaId=" + assembleiaId)).json();

    if (!pauta || !pauta.numero) {
      document.getElementById("statusVotacao").innerText = "Nenhuma pauta aberta";
      return;
    }

    const tokens = await (await fetch("/api/tokens?assembleiaId=" + assembleiaId)).json();
    const votos = await (await fetch("/api/votos?assembleiaId=" + assembleiaId)).json();

    const votosPauta = votos.filter(v => Number(v.pautaNumero) === Number(pauta.numero));

    const total = tokens.length;
    const votaram = votosPauta.length;
    const faltam = total - votaram;

    document.getElementById("statusVotacao").innerText =
      "Pauta " + pauta.numero +
      " | Total: " + total +
      " | Votaram: " + votaram +
      " | Faltam: " + faltam;

  }catch(e){
    console.error(e);
  }
}

async function carregarPautas(){
  try{
    const resp = await fetch("/api/pautas/" + assembleiaId);
    const pautas = await resp.json();

    const div = document.getElementById("listaPautas");
    div.innerHTML = "";

    if(!Array.isArray(pautas) || pautas.length === 0){
      div.innerHTML = "<div>Nenhuma pauta encontrada</div>";
      return;
    }

    pautas.forEach(p => {
      const el = document.createElement("div");

      el.innerHTML = `
        <div class="card p-3 mb-3">
          <div class="d-flex justify-content-between align-items-center">

            <div style="text-align:left">
              <b>${p.numero}. ${p.titulo}</b>
              <div class="text-muted small">${p.descricao || ""}</div>

              <div class="mt-2">
                <small class="badge-status ${p.status === 'aberta' ? 'aberta' : 'fechada'}">
                  ${p.status.toUpperCase()}
                </small>
              </div>
            </div>

            <div class="d-flex flex-column gap-2">
              <button class="btn btn-success btn-sm" onclick="abrirPauta(${p.numero})">Abrir</button>
              <button class="btn btn-danger btn-sm" onclick="encerrarPauta(${p.numero})">Encerrar</button>
            </div>

          </div>
        </div>
      `;

      div.appendChild(el);
    });

  }catch(e){
    console.error("ERRO AO CARREGAR PAUTAS:", e);
    document.getElementById("listaPautas").innerHTML =
      "<div class='text-danger'>Erro ao carregar pautas</div>";
  }
}

async function abrirPauta(numero){
  await fetch("/api/pautas/abrir/" + numero + "?assembleiaId=" + assembleiaId, {
    method: "POST"
  });
  carregarPautas();
}

async function encerrarPauta(numero){
  await fetch("/api/pautas/encerrar/" + numero + "?assembleiaId=" + assembleiaId, {
    method: "POST"
  });
  carregarPautas();
}

carregarCamposSessao();
carregarPautas();
atualizarStatusVotacao();

setInterval(atualizarStatusVotacao, 3000);
</script>

</body>
</html>
