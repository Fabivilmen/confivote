<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Criar Assembleia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* Título */
h3{
  font-weight: 800;
}

/* Cards */
.card{
  border-radius: 18px;
  border: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* Labels */
label{
  font-weight: 600;
  margin-bottom: 4px;
}

/* Inputs */
.form-control, .form-select{
  border-radius: 10px;
  padding: 10px;
}

/* Botões */
.btn{
  border-radius: 10px;
  font-weight: 600;
}

/* Botão principal */
.btn-success{
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
}

/* Botão adicionar */
.btn-primary{
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  border: none;
}

/* Tabela */
.table{
  border-radius: 10px;
  overflow: hidden;
}

/* Cabeçalho */
.table thead{
  background: #f1f5f9;
}

/* Espaçamento */
.container{
  max-width: 900px;
}

@media print {
  button {
    display: none;
  }
}

</style>

</head>

<body>

<div class="container mt-4 mb-5">
<div class="text-center mb-3">
  <img src="/img/logo-confivote.png" style="width:90px;">
</div>

<h3 class="mb-4">Criar Assembleia</h3>

<!-- DADOS -->
<div class="card p-4 mb-4">
<div class="row g-3">

<div class="col-md-6">
<label>Nome do prédio</label>
<input id="nomePredio" class="form-control">
</div>

<div class="col-md-3">
<label>Data</label>
<input type="date" id="dataAssembleia" class="form-control">
</div>

<div class="col-md-3">
<label>Hora</label>
<input type="time" id="horaAssembleia" class="form-control">
</div>

<div class="col-md-6">
<label>Local</label>
<input id="localAssembleia" class="form-control">
</div>

<div class="col-md-6">
<label>Convidados</label>
<input id="convidados" class="form-control">
</div>

</div>
</div>

<!-- TEXTO -->
<div class="card p-4 mb-4">
<label>Texto da convocação</label>
<textarea id="textoConvocacao" class="form-control" rows="5"></textarea>
</div>

<!-- ORDEM -->
<div class="card p-4 mb-4">
<label>Ordem do dia</label>
<textarea id="ordemDoDia" class="form-control" rows="4"></textarea>
</div>

<!-- PAUTAS -->
<div class="card p-4 mb-4">

<div class="d-flex justify-content-between align-items-center mb-3">
<h5 class="mb-0">Pautas</h5>
<button class="btn btn-primary btn-sm" onclick="adicionarPauta()">Adicionar</button>
</div>

<table class="table table-bordered align-middle">
<thead>
<tr>
<th>Nº</th>
<th>Título</th>
<th>Descrição</th>
<th>Maioria</th>
<th></th>
</tr>
</thead>
<tbody id="corpoPautas"></tbody>
</table>

</div>

<div class="d-flex gap-2">

<button class="btn btn-outline-secondary" onclick="window.print()">
Imprimir
</button>

<button class="btn btn-success" onclick="salvarEIrParaMoradores()">
Salvar e continuar
</button>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const assembleiaId = params.get("assembleiaId") || 1;

function adicionarPauta(){

  const tbody = document.getElementById("corpoPautas");
  const numero = tbody.children.length + 1;

  const tr = document.createElement("tr");

  tr.innerHTML = `
  <td>${numero}</td>
  <td><input class="form-control"></td>
  <td><textarea class="form-control"></textarea></td>
  <td>
    <select class="form-select">
      <option>simples</option>
      <option>2/3</option>
      <option>4/5</option>
      <option>unanimidade</option>
    </select>
  </td>
  <td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">X</button></td>
  `;

  tbody.appendChild(tr);
}

async function salvarEIrParaMoradores(){

  const linhas = document.querySelectorAll("#corpoPautas tr");

  await fetch("/api/pautas/limpar?assembleiaId=" + assembleiaId, {
    method: "POST"
  });

  for(const linha of linhas){

    const titulo = linha.children[1].querySelector("input").value;
    const descricao = linha.children[2].querySelector("textarea").value;
    const maioria = linha.children[3].querySelector("select").value;

    if(titulo.trim() === "") continue;

    await fetch("/api/pautas", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        assembleiaId,
        titulo,
        descricao,
        maioria
      })
    });
  }

  localStorage.setItem("assembleia_" + assembleiaId, JSON.stringify({
    nomePredio: document.getElementById("nomePredio").value,
    data: document.getElementById("dataAssembleia").value,
    hora: document.getElementById("horaAssembleia").value,
    local: document.getElementById("localAssembleia").value,
    convidados: document.getElementById("convidados").value,
    textoConvocacao: document.getElementById("textoConvocacao").value,
    ordemDoDia: document.getElementById("ordemDoDia").value
  }));

  window.location.href = "/admin/moradores.html?assembleiaId=" + assembleiaId;
}

</script>

</body>
</html>
