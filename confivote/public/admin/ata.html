<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>ATA da Assembleia</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{background:#f4f6f9}

.card{
border:none;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,.1)
}

canvas{
border:1px solid #ccc;
border-radius:6px;
background:white
}

.assinatura{
width:180px;
height:80px
}

@media print{
button{display:none}
body{background:white}
}

</style>

</head>

<body>

<div class="container py-4" style="max-width:950px">

<div class="card p-4">

<h3 class="text-center mb-4">ATA DA ASSEMBLEIA</h3>

<div id="dados" class="mb-4"></div>

<h5>Resultados das Pautas</h5>

<table class="table table-bordered">

<thead class="table-light">

<tr>
<th>Pauta</th>
<th>SIM</th>
<th>NÃO</th>
<th>ABS</th>
<th>% Aprovação</th>
<th>Resultado</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

<div id="encerramento" class="mt-3"></div>

<hr>

<h5>Observações</h5>

<textarea class="form-control mb-3" rows="4"></textarea>

<h5>Convidados</h5>

<textarea class="form-control mb-3" rows="2"></textarea>

<hr>

<h6 class="text-center">Assinaturas</h6>

<div class="d-flex justify-content-around mt-3">

<div class="text-center">

<canvas id="c1" class="assinatura"></canvas>

<div class="small">Presidente</div>

<button class="btn btn-sm btn-outline-secondary mt-1"
onclick="clearCanvas(c1)">
Limpar
</button>

</div>

<div class="text-center">

<canvas id="c2" class="assinatura"></canvas>

<div class="small">Secretário</div>

<button class="btn btn-sm btn-outline-secondary mt-1"
onclick="clearCanvas(c2)">
Limpar
</button>

</div>

<div class="text-center">

<canvas id="c3" class="assinatura"></canvas>

<div class="small">Syndic</div>

<button class="btn btn-sm btn-outline-secondary mt-1"
onclick="clearCanvas(c3)">
Limpar
</button>

</div>

</div>

<button class="btn btn-dark w-100 mt-4"
onclick="window.print()">
Imprimir / PDF
</button>

</div>
</div>

<script>

const qs = new URLSearchParams(location.search);
const id = qs.get("assembleiaId");

const assembleia =
JSON.parse(localStorage.getItem("confivote_assembleia_"+id));

const topo =
JSON.parse(localStorage.getItem("sessao_"+id));

const horaInicio =
localStorage.getItem("hora_inicio_"+id);

const horaFim =
localStorage.getItem("hora_fim_"+id);

/* DADOS GERAIS */

document.getElementById("dados").innerHTML =

"<b>Condomínio:</b> "+assembleia.condominio+"<br>"+

"<b>Data:</b> "+assembleia.data+" "+assembleia.hora+"<br>"+

"<b>Local:</b> "+assembleia.local+"<br>"+

"<b>Hora início:</b> "+horaInicio+"<br>"+

"<b>Hora encerramento:</b> "+horaFim+"<br>"+

"<b>Presidente:</b> "+(topo?.presidente||"-")+"<br>"+

"<b>Secretário:</b> "+(topo?.secretario||"-")+"<br>"+

"<b>Syndic:</b> "+(topo?.sindic||"-");

/* RESULTADOS */

const tbody = document.getElementById("tabela");

assembleia.pautas.forEach((p,i)=>{

const r =
JSON.parse(localStorage.getItem("resultado_final_"+id+"_"+i));

if(!r) return;

const tr = document.createElement("tr");

tr.innerHTML=

"<td>"+p.titulo+"</td>"+

"<td>"+r.sim+"</td>"+

"<td>"+r.nao+"</td>"+

"<td>"+r.abs+"</td>"+

"<td>"+r.perc.toFixed(2)+"%</td>"+

"<td><b>"+r.aprovado+"</b></td>";

tbody.appendChild(tr);

});

/* ENCERRAMENTO */

document.getElementById("encerramento").innerHTML =

"<b>Sessão encerrada às:</b> "+horaFim;

/* ASSINATURA */

function assinatura(canvas){

const ctx = canvas.getContext("2d");

let d=false;

canvas.onmousedown=()=>d=true;

canvas.onmouseup=()=>d=false;

canvas.onmousemove=e=>{

if(!d) return;

const r=canvas.getBoundingClientRect();

ctx.lineTo(e.clientX-r.left,e.clientY-r.top);

ctx.stroke();

}

}

function clearCanvas(c){

c.getContext("2d").clearRect(0,0,c.width,c.height);

}

assinatura(c1);
assinatura(c2);
assinatura(c3);

</script>

</body>
</html>
